name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/*requirements*.txt', '**/pyproject.toml') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"

    - name: Lint with Ruff
      run: |
        # Check for critical errors, ignoring:
        # - I001: import sorting (cosmetic)
        # - F401: unused imports (would require larger refactoring)
        # - F841: unused variables (would require larger refactoring)
        ruff check aipp_opener/ tests/ --ignore I001,F401,F841

    - name: Check formatting with Black
      run: |
        black --check aipp_opener/ tests/

    - name: Type check with Mypy
      run: |
        mypy aipp_opener/ --ignore-missing-imports --warn-return-any --warn-unused-configs

    - name: Run tests with pytest
      run: |
        pytest tests/ -v --cov=aipp_opener --cov-report=xml --cov-report=term-missing

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Build package
      run: |
        python -m pip install --upgrade pip build
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/

  container:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v4

    - name: Build container image
      run: |
        podman build -t aipp-opener:test .

    - name: Test container
      run: |
        podman run --rm aipp-opener:test python -m pytest tests/ --override-ini="addopts=" -v
